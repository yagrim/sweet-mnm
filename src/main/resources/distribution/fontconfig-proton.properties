# Java Font Configuration File — Windows 10 / 11
# Place in: $JDKHOME/conf/fonts/fontconfig-free.properties
#
# Canonical filenames verified against:
#   https://learn.microsoft.com/en-us/typography/fonts/windows_11_font_list
#
# Root causes of "No physical fonts found":
#   1. filename.* entries resolving to files absent on the machine
#      (Symbol.ttf, Wingding.ttf, Times.ttf all removed/replaced in
#      Windows 10+ security updates — don't use them)
#   2. A character subset listed in sequence.* has a filename.* entry
#      that can't be found → the whole font config is rejected
#
# Strategy: use only fonts guaranteed present in every Windows 10/11
# install (Arial, Courier New, Georgia, Calibri, Consolas, Segoe UI).
# Skip symbol/dingbats subsets entirely — the JDK will synthesise them
# from the fallback chain or ignore them gracefully.

# -----------------------------------------------------------------------
# Version (required)
# -----------------------------------------------------------------------
version=1

# -----------------------------------------------------------------------
# Component Font Mappings
# -----------------------------------------------------------------------

# serif  →  Georgia (guaranteed: Georgia.ttf / Georgiai.ttf / etc.)
serif.plain.alphabetic=Georgia
serif.bold.alphabetic=Georgia Bold
serif.italic.alphabetic=Georgia Italic
serif.bolditalic.alphabetic=Georgia Bold Italic

# sansserif  →  Arial (guaranteed: Arial.ttf / Arialbd.ttf / etc.)
sansserif.plain.alphabetic=Arial
sansserif.bold.alphabetic=Arial Bold
sansserif.italic.alphabetic=Arial Italic
sansserif.bolditalic.alphabetic=Arial Bold Italic

# monospaced  →  Courier New (guaranteed: Cour.ttf / Courbd.ttf / etc.)
monospaced.plain.alphabetic=Courier New
monospaced.bold.alphabetic=Courier New Bold
monospaced.italic.alphabetic=Courier New Italic
monospaced.bolditalic.alphabetic=Courier New Bold Italic

# dialog  →  Arial
dialog.plain.alphabetic=Arial
dialog.bold.alphabetic=Arial Bold
dialog.italic.alphabetic=Arial Italic
dialog.bolditalic.alphabetic=Arial Bold Italic

# dialoginput  →  Courier New
dialoginput.plain.alphabetic=Courier New
dialoginput.bold.alphabetic=Courier New Bold
dialoginput.italic.alphabetic=Courier New Italic
dialoginput.bolditalic.alphabetic=Courier New Bold Italic

# -----------------------------------------------------------------------
# Search Sequences
#
# REQUIRED: sequence.allfonts (bare) compiles to the "NULL.NULL.NULL"
# slot that getInitELC() falls back to — must always be present.
# Encoding-qualified keys let getInitELC() match at step 3.
#
# Only list subsets that have both a component mapping AND a filename
# entry below.  Listing "symbol" or "dingbats" here while those files
# are absent is what triggers "No physical fonts found".
# -----------------------------------------------------------------------

sequence.allfonts=alphabetic
sequence.allfonts.windows-1252=alphabetic
sequence.allfonts.UTF-8=alphabetic
sequence.allfonts.UTF-16=alphabetic
sequence.allfonts.UTF-16LE=alphabetic
sequence.allfonts.UTF-16BE=alphabetic

# -----------------------------------------------------------------------
# Font File Names  (case-insensitive on Windows; use official casing)
# Source: https://learn.microsoft.com/en-us/typography/fonts/windows_11_font_list
# -----------------------------------------------------------------------

# Arial family
filename.Arial=arial.ttf
filename.Arial_Bold=arialbd.ttf
filename.Arial_Italic=ariali.ttf
filename.Arial_Bold_Italic=arialbi.ttf

# Georgia family (serif replacement; present since Windows XP)
filename.Georgia=georgia.ttf
filename.Georgia_Bold=georgiab.ttf
filename.Georgia_Italic=georgiai.ttf
filename.Georgia_Bold_Italic=georgiaz.ttf

# Courier New family
filename.Courier_New=cour.ttf
filename.Courier_New_Bold=courbd.ttf
filename.Courier_New_Italic=couri.ttf
filename.Courier_New_Bold_Italic=courbi.ttf
