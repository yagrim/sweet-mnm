# Java Font Configuration File — Liberation Fonts (free/redistributable)
# Place in: $JDKHOME/conf/fonts/fontconfig-free.properties
#
# Uses the Liberation font family (SIL Open Font License v1.1):
#   https://github.com/liberationfonts/liberation-fonts
#
# These are metrically compatible with Arial, Times New Roman, and
# Courier New, so document layout is preserved when substituting.
#
# FONT LOADING — three options, in order of preference:
#
#  A) appendedfontpath (this file, below) — JDK appends the listed
#     directory to its font search path at startup.  Use an absolute
#     path, or a path relative to the working directory.  Multiple
#     directories are separated by the platform path separator (; on
#     Windows, : on Linux/macOS).
#
#  B) -Dsun.java2d.fontpath=<dir> — same effect as appendedfontpath
#     but set at JVM launch time; useful when you can't modify this
#     file (e.g. the path is only known at runtime):
#       java -Dsun.java2d.fontpath=C:\myapp\fonts -jar myapp.jar
#
#  C) $JDKHOME/lib/fonts/ — the JDK always searches this directory
#     first, before appendedfontpath and before the OS fonts folder.
#     Good for fonts that are truly part of the JDK distribution.
#
# Download: https://github.com/liberationfonts/liberation-fonts/releases

# -----------------------------------------------------------------------
# Version (required)
# -----------------------------------------------------------------------
version=1

# -----------------------------------------------------------------------
# Component Font Mappings
# -----------------------------------------------------------------------

# serif  →  Liberation Serif  (metrics-compatible with Times New Roman)
serif.plain.alphabetic=Liberation Serif
serif.bold.alphabetic=Liberation Serif Bold
serif.italic.alphabetic=Liberation Serif Italic
serif.bolditalic.alphabetic=Liberation Serif Bold Italic

# sansserif  →  Liberation Sans  (metrics-compatible with Arial)
sansserif.plain.alphabetic=Liberation Sans
sansserif.bold.alphabetic=Liberation Sans Bold
sansserif.italic.alphabetic=Liberation Sans Italic
sansserif.bolditalic.alphabetic=Liberation Sans Bold Italic

# monospaced  →  Liberation Mono  (metrics-compatible with Courier New)
monospaced.plain.alphabetic=Liberation Mono
monospaced.bold.alphabetic=Liberation Mono Bold
monospaced.italic.alphabetic=Liberation Mono Italic
monospaced.bolditalic.alphabetic=Liberation Mono Bold Italic

# dialog  →  Liberation Sans
dialog.plain.alphabetic=Liberation Sans
dialog.bold.alphabetic=Liberation Sans Bold
dialog.italic.alphabetic=Liberation Sans Italic
dialog.bolditalic.alphabetic=Liberation Sans Bold Italic

# dialoginput  →  Liberation Mono
dialoginput.plain.alphabetic=Liberation Mono
dialoginput.bold.alphabetic=Liberation Mono Bold
dialoginput.italic.alphabetic=Liberation Mono Italic
dialoginput.bolditalic.alphabetic=Liberation Mono Bold Italic

# -----------------------------------------------------------------------
# Search Sequences
#
# sequence.allfonts (bare) → compiled as "NULL.NULL.NULL", required.
# Encoding-qualified variants let getInitELC() match at step 3.
# -----------------------------------------------------------------------

sequence.allfonts=alphabetic
sequence.allfonts.windows-1252=alphabetic
sequence.allfonts.UTF-8=alphabetic
sequence.allfonts.UTF-16=alphabetic
sequence.allfonts.UTF-16LE=alphabetic
sequence.allfonts.UTF-16BE=alphabetic

# -----------------------------------------------------------------------
# Appended Font Path
#
# The JDK searches this directory for font files in addition to its own
# lib/fonts/ and the OS fonts folder.  Edit the path to match wherever
# you ship your fonts.  Use ; to separate multiple directories on
# Windows, : on Linux/macOS.
#
# Examples:
#   appendedfontpath=C:\myapp\fonts
#   appendedfontpath=${user.home}/myapp/fonts   (system property expansion)
#   appendedfontpath=fonts                       (relative to working dir)
# -----------------------------------------------------------------------
appendedfontpath=fonts

# -----------------------------------------------------------------------
# Font File Names
# Exact filenames as shipped in the liberation-fonts TTF release tarball.
# Place these files in $JDKHOME/lib/fonts/
# -----------------------------------------------------------------------

filename.Liberation_Serif=LiberationSerif-Regular.ttf
filename.Liberation_Serif_Bold=LiberationSerif-Bold.ttf
filename.Liberation_Serif_Italic=LiberationSerif-Italic.ttf
filename.Liberation_Serif_Bold_Italic=LiberationSerif-BoldItalic.ttf

filename.Liberation_Sans=LiberationSans-Regular.ttf
filename.Liberation_Sans_Bold=LiberationSans-Bold.ttf
filename.Liberation_Sans_Italic=LiberationSans-Italic.ttf
filename.Liberation_Sans_Bold_Italic=LiberationSans-BoldItalic.ttf

filename.Liberation_Mono=LiberationMono-Regular.ttf
filename.Liberation_Mono_Bold=LiberationMono-Bold.ttf
filename.Liberation_Mono_Italic=LiberationMono-Italic.ttf
filename.Liberation_Mono_Bold_Italic=LiberationMono-BoldItalic.ttf
