# Java Font Configuration File ? Windows
# Place in: $JDKHOME/conf/fonts/fontconfig.properties
# Spec: https://docs.oracle.com/en/java/javase/21/intl/font-configuration-files.html
#
# FIX: getInitELC() looks up the sequence table by:
#   1. initEncoding + "." + language + "." + country  (e.g. "windows-1252.en.US")
#   2. initEncoding + "." + language                  (e.g. "windows-1252.en")
#   3. initEncoding                                    (e.g. "windows-1252")
#   4. fallback key "NULL.NULL.NULL"
# If NONE of these exist in the table the HashMap.get() returns null ? NPE.
# The bare "sequence.allfonts" (no suffix) is compiled into "NULL.NULL.NULL",
# so it MUST be present.  Encoding-qualified keys cover the common Windows
# encodings so step 3 matches before reaching the NULL fallback.

# -----------------------------------------------------------------------
# Version (required)
# -----------------------------------------------------------------------
version=1

# -----------------------------------------------------------------------
# Component Font Mappings
# "allfonts" form applies independent of logical font + style.
# -----------------------------------------------------------------------
allfonts.alphabetic=Arial
allfonts.latin=Arial
allfonts.symbol=Symbol
allfonts.dingbats=Wingdings

# serif
serif.plain.alphabetic=Times New Roman
serif.bold.alphabetic=Times New Roman Bold
serif.italic.alphabetic=Times New Roman Italic
serif.bolditalic.alphabetic=Times New Roman Bold Italic

# sansserif
sansserif.plain.alphabetic=Arial
sansserif.bold.alphabetic=Arial Bold
sansserif.italic.alphabetic=Arial Italic
sansserif.bolditalic.alphabetic=Arial Bold Italic

# monospaced
monospaced.plain.alphabetic=Courier New
monospaced.bold.alphabetic=Courier New Bold
monospaced.italic.alphabetic=Courier New Italic
monospaced.bolditalic.alphabetic=Courier New Bold Italic

# dialog
dialog.plain.alphabetic=Arial
dialog.bold.alphabetic=Arial Bold
dialog.italic.alphabetic=Arial Italic
dialog.bolditalic.alphabetic=Arial Bold Italic

# dialoginput
dialoginput.plain.alphabetic=Courier New
dialoginput.bold.alphabetic=Courier New Bold
dialoginput.italic.alphabetic=Courier New Italic
dialoginput.bolditalic.alphabetic=Courier New Bold Italic

# -----------------------------------------------------------------------
# Search Sequences
#
# CRITICAL: getInitELC() MUST find at least one key that matches the
# runtime encoding (or fall through to NULL.NULL.NULL).
#
# "sequence.allfonts"  ? stored as key "NULL.NULL.NULL" ? required fallback.
# Encoding-qualified keys let step 3 match before reaching NULL.NULL.NULL.
#
# Common Windows encodings; add others (cp1250, cp1251 ?) if needed.
# -----------------------------------------------------------------------

# --- NULL.NULL.NULL fallback (bare "allfonts") ? MUST be present ---
sequence.allfonts=alphabetic,symbol,dingbats

# --- Western Windows encodings ---
sequence.allfonts.windows-1252=alphabetic,symbol,dingbats
sequence.allfonts.UTF-8=alphabetic,symbol,dingbats
sequence.allfonts.UTF-16=alphabetic,symbol,dingbats

# Optional 2D-only fallback chain
sequence.fallback=latin

# -----------------------------------------------------------------------
# Font File Names
# Simple filenames ? runtime searches lib/fonts then the Windows Fonts dir.
# -----------------------------------------------------------------------
filename.Arial=arial.ttf
filename.Arial_Bold=arialbd.ttf
filename.Arial_Italic=ariali.ttf
filename.Arial_Bold_Italic=arialbi.ttf

filename.Times_New_Roman=times.ttf
filename.Times_New_Roman_Bold=timesbd.ttf
filename.Times_New_Roman_Italic=timesi.ttf
filename.Times_New_Roman_Bold_Italic=timesbi.ttf

filename.Courier_New=cour.ttf
filename.Courier_New_Bold=courbd.ttf
filename.Courier_New_Italic=couri.ttf
filename.Courier_New_Bold_Italic=courbi.ttf

filename.Symbol=symbol.ttf
filename.Wingdings=wingding.ttf
