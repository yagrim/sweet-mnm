name: Tests

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Gradle tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Set up Java
        uses: graalvm/setup-graalvm@v1
        with:
          distribution: graalvm-community
          java-version: "25"
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install xxhsum
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y xxhash
      - name: Display versions
        shell: bash
        run: |
          java --version
          native-image --version         
          xxhsum --version
      - name: Run tests
        run: make test
      - name: Native build
        run: make native
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: build-reports-${{ matrix.os }}
          path: build/reports/**
          if-no-files-found: warn
