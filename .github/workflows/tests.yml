name: Tests

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Gradle tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    env:
      BINARY_LOCATION: build/native/nativeCompile/
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
        include:
          - os: ubuntu-latest
            artifact_os: linux
          - os: windows-latest
            artifact_os: windows
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Set up Java
        uses: graalvm/setup-graalvm@v1
        with:
          distribution: graalvm-community
          java-version: "25"
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Check System.out
        if: runner.os == 'Linux'
        run: |
          ./scripts/check_system_out.sh \
            --exclude-packages org.mnm.cli,org.mnm.launcher \
            --exclude-classes MainClazz,InstallCommand,RepairCommand,TokenCommand
      - name: Install xxhsum (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y xxhash
      - name: Install xxhsum (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $headers = @{
            Accept = "application/vnd.github+json"
            Authorization = "Bearer $env:GITHUB_TOKEN"
            "X-GitHub-Api-Version" = "2026-03-10"
          }
          $release = Invoke-RestMethod `
            -Uri "https://api.github.com/repos/Cyan4973/xxHash/releases/latest" `
            -Headers $headers
          $asset = $release.assets | Where-Object {
            $_.name -match "win64" -and $_.name -match "\.zip$"
          } | Select-Object -First 1

          $downloadPath = "$env:RUNNER_TEMP\xxhash.zip"
          $extractPath = "$env:RUNNER_TEMP\xxhash"
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile $downloadPath
          Expand-Archive -Path $downloadPath -DestinationPath $extractPath -Force
          
          $exe = Get-ChildItem -Path $extractPath -Filter "xxhsum.exe" -Recurse | Select-Object -First 1        
          $exe.Directory.FullName | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      - name: Display versions
        shell: bash
        if: runner.os == 'Linux'
        run: |
          java --version
          native-image --version
          xxhsum --version
      - name: Display versions
        shell: bash
        if: runner.os == 'Windows'
        run: |
          java --version
          xxhsum --version
      - name: Run tests
        shell: bash
        run: make test
      - name: Native build
        shell: bash
        run: make native
      - name: Write native checksum (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          cd "$BINARY_LOCATION"
          md5sum sweet | awk '{print $1}' > md5checksum.txt
      - name: Write native checksum (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Set-Location $env:BINARY_LOCATION
          (Get-FileHash -Algorithm MD5 -Path sweet.exe).Hash | Out-File -FilePath md5checksum.txt -Encoding ascii
      - name: Set artifact architecture
        id: arch
        shell: bash
        run: echo "arch=$RUNNER_ARCH" >> "$GITHUB_OUTPUT"
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: build-reports-${{ matrix.os }}
          path: build/reports/**
          if-no-files-found: warn
      - name: Upload native binary
        uses: actions/upload-artifact@v7
        with:
          name: binary-${{ matrix.artifact_os }}-${{ steps.arch.outputs.arch }}.zip
          path: ${{ env.BINARY_LOCATION }}
          if-no-files-found: warn
      - name: Upload reachability metadata
        uses: actions/upload-artifact@v7
        with:
          name: reachability-metadata-${{ matrix.artifact_os }}-${{ steps.arch.outputs.arch }}.zip
          path: config-dir
          if-no-files-found: ignore
