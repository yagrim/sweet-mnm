name: Release

on:
  release:
    types:
      - created

permissions:
  contents: write

jobs:
  build-linux:
    name: Build (linux)
    runs-on: ubuntu-latest
    env:
      BINARY_LOCATION: build/native/nativeCompile/
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Setup environment
        id: setup
        uses: ./.github/actions/setup-environment
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Native build
        shell: bash
        run: |
          version="${{ github.event.release.name }}"
          version="${version#v}"
          ./gradlew clean nativeCompile -PbuildVersion="$version"
      - name: Verify binary
        shell: bash
        run: ${{ env.BINARY_LOCATION }}sweet version
      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: linux-${{ steps.setup.outputs.arch }}
          path: ${{ env.BINARY_LOCATION }}

  build-windows:
    name: Build (windows)
    runs-on: windows-latest
    env:
      BINARY_LOCATION: build/native/nativeCompile/
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Setup environment
        id: setup
        uses: ./.github/actions/setup-environment
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Native build
        shell: pwsh
        run: |
          $version = "${{ github.event.release.name }}"
          $version = $version -replace '^v', ''
          Write-Host "Building version: $version"
          ./gradlew clean nativeCompile "-PbuildVersion=$version"
      - name: Verify binary
        shell: pwsh
        run: '& "$env:BINARY_LOCATION\sweet.exe" version'
      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: windows-${{ steps.setup.outputs.arch }}
          path: ${{ env.BINARY_LOCATION }}

  publish:
    name: Publish release artifacts
    runs-on: ubuntu-latest
    needs:
      - build-linux
      - build-windows
    steps:
      - name: Download all binary artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts
      - name: List artifacts
        shell: bash
        run: find . -type f -print
      # See if they are in folders, then compress here and upload zips
      - name: Prepare zip
        run: |
          find ./artifacts -mindepth 1 -maxdepth 1 -type d | while read dir; do
            name=$(basename "$dir")
            (cd "$dir" && zip -r "../${name}.zip" .)
            echo "Created ./artifacts/${name}.zip"
          done
          ls -lah ./artifacts
      - name: Upload binaries to release
        uses: softprops/action-gh-release@v3
        with:
          files: artifacts/*.zip
