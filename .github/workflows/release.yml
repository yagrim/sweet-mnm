name: Release

on:
  release:
    types:
      - created

permissions:
  contents: write

jobs:
  build-linux:
    name: Build (linux)
    runs-on: ubuntu-latest
    env:
      BINARY_LOCATION: build/native/nativeCompile/
    steps:
      - name: Setup environment
        id: setup
        uses: ./.github/actions/setup-environment
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Native build
        shell: bash
        run: ./gradlew clean nativeCompile -PbuildVersion=${{ github.event.release.name }}
      - name: Verify binary
        shell: bash
        run: ${{ env.BINARY_LOCATION }}sweet version
      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: binary-linux-${{ steps.setup.outputs.arch }}
          path: ${{ env.BINARY_LOCATION }}

  build-windows:
    name: Build (windows)
    runs-on: windows-latest
    env:
      BINARY_LOCATION: build/native/nativeCompile/
    steps:
      - name: Setup environment
        id: setup
        uses: ./.github/actions/setup-environment
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Native build
        shell: pwsh
        run: ./gradlew clean nativeCompile -PbuildVersion=${{ github.event.release.name }}
      - name: Verify binary
        shell: pwsh
        run: & "$env:BINARY_LOCATION\sweet.exe" version
      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: binary-windows-${{ steps.setup.outputs.arch }}
          path: ${{ env.BINARY_LOCATION }}

  publish:
    name: Publish release artifacts
    runs-on: ubuntu-latest
    needs:
      - build-linux
      - build-windows
    steps:
      - name: Download all binary artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts
          merge-multiple: true
      - name: Upload binaries to release
        uses: softprops/action-gh-release@v3
        with:
          files: artifacts/**
